<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Break · 等 AI 写代码</title>
<style>
  :root{--bg1:#eef3fb;--bg2:#f7f3ea;--ink:#2b3a4a;--sub:#7c8a9a;
    --blue:#4a78b0;--gold:#d9a441;--card:#fffdf8;--line:#efe7d6}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,"PingFang SC","Hiragino Sans","Microsoft YaHei",sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--ink);
    min-height:100vh;padding:78px 20px 40px;display:flex;flex-direction:column;align-items:center}
  .status{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--card);
    border:1px solid var(--line);border-radius:999px;padding:9px 18px;font-size:14px;display:flex;
    align-items:center;gap:9px;box-shadow:0 6px 22px rgba(74,120,176,.12);white-space:nowrap;z-index:5}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--blue);animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.25)}}
  .status.done{border-color:#bfe0c2}.status.done .dot{background:#3fa45a;animation:none}
  .langs{position:fixed;top:16px;right:18px;display:flex;gap:6px;z-index:5}
  .langs button{font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--card);
    color:var(--sub);border-radius:10px;padding:7px 11px;cursor:pointer}
  .langs button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .achBtn{position:fixed;top:16px;left:18px;font-size:13px;font-weight:600;border:1px solid var(--line);
    background:var(--card);color:var(--gold);border-radius:10px;padding:7px 12px;cursor:pointer;z-index:5}
  h1.title{font-size:26px;margin-bottom:6px}
  .subtitle{color:var(--sub);font-size:14px;margin-bottom:24px;text-align:center}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:13px;width:min(660px,94vw)}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 14px;
    cursor:pointer;transition:.16s;text-align:center;position:relative}
  .gcard:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(43,58,74,.12)}
  .gcard .ic{font-size:30px;margin-bottom:9px}
  .gcard .gn{font-weight:700;font-size:15px;margin-bottom:3px}
  .gcard .gd{font-size:12px;color:var(--sub);line-height:1.4}
  .gcard.feat{grid-column:1/-1;background:linear-gradient(135deg,#fff,#fbf4e6);border-color:#ecd9a8}
  .badge{position:absolute;top:9px;right:11px;font-size:10px;font-weight:800;letter-spacing:.1em;
    color:var(--gold);background:#fbf1d6;border-radius:6px;padding:3px 7px}
  .view{display:none;width:min(560px,94vw);flex-direction:column;align-items:center}
  .view.on{display:flex}
  #home.on{display:flex;flex-direction:column;align-items:center}
  .back{align-self:flex-start;background:none;border:none;color:var(--blue);font-size:14px;
    font-weight:600;cursor:pointer;margin-bottom:14px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:28px 24px;
    width:100%;box-shadow:0 14px 40px rgba(43,58,74,.12);text-align:center}
  .bar{display:flex;justify-content:center;gap:18px;font-size:13px;color:var(--sub);margin-top:14px}
  button.act{font-family:inherit;font-weight:600;cursor:pointer;border:none;border-radius:13px;
    padding:11px 20px;font-size:15px;transition:.16s}
  .primary{background:var(--blue);color:#fff}.primary:hover{background:#3d6699}
  .ghost{background:#f0ead9;color:var(--ink)}.ghost:hover{background:#e7dec8}
  .row{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}
  .ghint{font-size:13px;color:var(--sub);margin-bottom:12px;line-height:1.4}
  .q{font-size:22px;line-height:1.55;font-weight:600;min-height:84px;display:flex;align-items:center;justify-content:center}
  .ans{margin-top:12px;font-size:19px;color:var(--blue);font-weight:700;min-height:28px;opacity:0;transition:.3s}
  .ans.show{opacity:1}
  .mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:6px auto 0;width:min(320px,80vw)}
  .mcard{aspect-ratio:1;border-radius:12px;background:var(--blue);display:flex;align-items:center;
    justify-content:center;font-size:28px;cursor:pointer;user-select:none;transition:.2s;color:transparent}
  .mcard.flip{background:#eef3fb;color:initial}.mcard.done{background:#e6f3e9;color:initial;cursor:default}
  .b2048{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:#e7dec8;padding:8px;
    border-radius:12px;width:min(290px,78vw);margin:4px auto 0}
  .t2048{aspect-ratio:1;border-radius:8px;background:#f3eddd;display:flex;align-items:center;
    justify-content:center;font-weight:800;font-size:21px;color:#2b3a4a}
  .pad{display:grid;grid-template-columns:repeat(3,44px);gap:6px;justify-content:center;margin-top:14px}
  .pad button{aspect-ratio:1;border:none;border-radius:10px;background:#f0ead9;font-size:17px;cursor:pointer}
  .pad .sp{visibility:hidden}
  .ginput{font-family:inherit;font-size:18px;text-align:center;width:130px;padding:11px;
    border:1px solid var(--line);border-radius:12px;background:#fff}
  .hint{margin-top:14px;font-size:17px;font-weight:600;min-height:26px}
  .react{height:160px;border-radius:18px;display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:600;cursor:pointer;user-select:none;color:#fff;transition:background .05s}
  .react.wait{background:#c98b8b}.react.go{background:#5bb377}.react.idle{background:var(--blue)}
  #timberTree{width:min(300px,80vw);margin:0 auto;display:flex;flex-direction:column-reverse}
  .trow{display:grid;grid-template-columns:1fr 56px 1fr;align-items:center;height:38px}
  .trunk{height:38px;background:linear-gradient(#b5854f,#9c6f3c);border:1px solid #8a5f30}
  .branch{font-size:24px}.bl{text-align:right}.br{text-align:left}.player{font-size:26px}
  .tbar{height:10px;background:#eee;border-radius:6px;margin:12px auto 0;width:min(300px,80vw);overflow:hidden}
  .tbar>div{height:100%;background:#5bb377;transition:width .1s linear}
  #flappyCanvas{background:#dff0fb;border-radius:14px;touch-action:manipulation;cursor:pointer}
  .sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:min(240px,68vw);margin:4px auto 0}
  .stile{aspect-ratio:1;border:none;border-radius:12px;background:var(--blue);color:#fff;font-size:26px;
    font-weight:800;cursor:pointer;font-family:inherit}
  .stile.empty{background:transparent;cursor:default}
  /* sokoban */
  .lvgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;width:min(330px,82vw);margin:4px auto 0}
  .lvcell{aspect-ratio:1;border-radius:13px;border:1px solid var(--line);background:#f6f1e4;font-size:17px;
    font-weight:800;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-direction:column;font-family:inherit}
  .lvcell.lock{color:#c7c0b2;cursor:not-allowed;background:#f0ece2}
  .lvcell.clear{background:#e6f3e9;border-color:#bfe0c2}
  .lvcell .st{font-size:11px;color:#3fa45a;margin-top:2px}
  #skBoard{display:inline-grid;gap:0;margin:2px auto 0;background:#cdbfa3;border-radius:10px;
    padding:6px;border:1px solid #b8a884}
  .sk{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:21px}
  .sk-wall{background:#9c7b4d}.sk-floor{background:#f3ead7}.sk-target{background:#f3ead7;box-shadow:inset 0 0 0 3px #d9a441}
  .sk-boxok{background:#cdebd2!important}
  /* pet */
  #petStage{position:relative;height:160px;display:flex;align-items:center;justify-content:center;margin:2px 0}
  #petMascot{animation:bob 2.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  #petFx{position:absolute;inset:0;pointer-events:none}
  .petfx{position:absolute;top:46%;font-size:26px;animation:rise 1s ease-out forwards}
  @keyframes rise{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-54px)}}
  .pbar{display:flex;align-items:center;gap:9px;margin:7px auto;width:min(300px,82vw);font-size:12px;color:var(--sub)}
  .pbar .lab{width:50px;text-align:right}
  .pbar .track{flex:1;height:10px;background:#efe7d6;border-radius:6px;overflow:hidden;display:block}
  .pbar .fill{display:block;height:100%;border-radius:6px;transition:width .3s}
  /* achievements */
  .achlist{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .achcell{display:flex;gap:10px;align-items:center;text-align:left;padding:11px 12px;border-radius:14px;
    background:#f6f1e4;border:1px solid var(--line)}
  .achcell.locked{opacity:.42;filter:grayscale(1)}
  .achcell .ai{font-size:24px}.achcell .at{font-weight:700;font-size:14px}.achcell .ad{font-size:11px;color:var(--sub)}
  .toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--ink);
    color:#fff;padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;opacity:0;
    transition:.35s;z-index:30;box-shadow:0 10px 30px rgba(0,0,0,.2)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .overlay{position:fixed;inset:0;background:rgba(247,243,234,.95);display:none;flex-direction:column;
    align-items:center;justify-content:center;z-index:20;text-align:center;padding:24px}
  .overlay.show{display:flex}.overlay h1{font-size:34px;margin-bottom:12px}
  .overlay p{color:var(--sub);font-size:16px}.cd{margin-top:18px;font-size:14px;color:var(--blue)}
</style>
</head>
<body>
  <div class="status" id="status"><span class="dot"></span><span id="statusText"></span></div>
  <button class="achBtn" id="achBtn"></button>
  <div class="langs" id="langs"></div>
  <div class="toast" id="toast"></div>

  <div class="view on" id="home">
    <h1 class="title" id="homeTitle"></h1>
    <div class="subtitle" id="homeSub"></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="view" id="v-sokoban"><button class="back" data-back></button><div class="panel">
    <div id="skSelect"></div>
    <div id="skPlay" style="display:none">
      <div class="ghint" id="skHint"></div>
      <div class="bar" style="margin:0 0 8px"><span id="skLevel"></span><span id="skMoves"></span></div>
      <div id="skBoard"></div>
      <div class="hint" id="skMsg"></div>
      <div class="pad"><span class="sp"></span><button data-sk="up">↑</button><span class="sp"></span>
        <button data-sk="left">←</button><button data-sk="down">↓</button><button data-sk="right">→</button></div>
      <div class="row"><button class="act ghost" id="skUndo"></button><button class="act ghost" id="skReset"></button>
        <button class="act primary" id="skNext" style="display:none"></button></div>
    </div>
  </div></div>

  <div class="view" id="v-pet"><button class="back" data-back></button><div class="panel">
    <div class="ghint" id="petHint"></div>
    <div class="bar" style="margin:0 0 4px"><span id="petLevel"></span><span id="petMoodTxt"></span></div>
    <div id="petStage"><div id="petMascot"></div><div id="petFx"></div></div>
    <div id="petStats"></div>
    <div class="row">
      <button class="act ghost" data-pet="feed" id="petFeed"></button>
      <button class="act ghost" data-pet="play" id="petPlay"></button>
      <button class="act ghost" data-pet="sleep" id="petSleep"></button>
      <button class="act ghost" data-pet="clean" id="petClean"></button>
    </div></div></div>

  <div class="view" id="v-riddle"><button class="back" data-back></button><div class="panel">
    <div class="q" id="rq"></div><div class="ans" id="ra"></div>
    <div class="row"><button class="act primary" id="rReveal"></button><button class="act ghost" id="rNext"></button></div>
    <div class="bar" id="rMeta"></div></div></div>

  <div class="view" id="v-memory"><button class="back" data-back></button><div class="panel">
    <div class="mgrid" id="mGrid"></div>
    <div class="bar"><span id="mMoves"></span><span id="mPairs"></span></div>
    <div class="row"><button class="act ghost" id="mRestart"></button></div></div></div>

  <div class="view" id="v-2048"><button class="back" data-back></button><div class="panel">
    <div class="bar" style="margin:0 0 8px"><span id="s2048"></span></div>
    <div class="b2048" id="g2048"></div>
    <div class="pad"><span class="sp"></span><button data-dir="up">↑</button><span class="sp"></span>
      <button data-dir="left">←</button><button data-dir="down">↓</button><button data-dir="right">→</button></div>
    <div class="row"><button class="act ghost" id="restart2048"></button></div></div></div>

  <div class="view" id="v-guess"><button class="back" data-back></button><div class="panel">
    <div class="q" id="guessPrompt" style="min-height:56px"></div>
    <div><input class="ginput" id="guessInput" type="number" min="1" max="100"></div>
    <div class="hint" id="guessHint"></div>
    <div class="row"><button class="act primary" id="guessBtn"></button><button class="act ghost" id="guessRestart"></button></div></div></div>

  <div class="view" id="v-react"><button class="back" data-back></button><div class="panel">
    <div class="react idle" id="reactBox"></div><div class="hint" id="reactResult"></div></div></div>

  <div class="view" id="v-timber"><button class="back" data-back></button><div class="panel">
    <div class="ghint" id="timberHint"></div>
    <div class="bar" style="margin:0 0 10px"><span id="timberScore"></span></div>
    <div id="timberTree"></div>
    <div class="tbar"><div id="timberBar"></div></div>
    <div class="hint" id="timberMsg"></div>
    <div class="row"><button class="act ghost" data-chop="left" id="timberL"></button>
      <button class="act ghost" data-chop="right" id="timberR"></button></div></div></div>

  <div class="view" id="v-flappy"><button class="back" data-back></button><div class="panel">
    <div class="ghint" id="flappyHint"></div>
    <div class="bar" style="margin:0 0 10px"><span id="flappyScore"></span></div>
    <canvas id="flappyCanvas" width="300" height="400"></canvas>
    <div class="hint" id="flappyMsg"></div></div></div>

  <div class="view" id="v-slide"><button class="back" data-back></button><div class="panel">
    <div class="ghint" id="slideHint"></div>
    <div class="sgrid" id="sGrid"></div>
    <div class="bar"><span id="slideMoves"></span></div>
    <div class="hint" id="slideMsg"></div>
    <div class="row"><button class="act ghost" id="slideShuffle"></button></div></div></div>

  <div class="view" id="v-ach"><button class="back" data-back></button><div class="panel">
    <h1 class="title" id="achTitle"></h1>
    <div class="subtitle" id="achCount" style="margin-bottom:14px"></div>
    <div class="achlist" id="achList"></div></div></div>

  <div class="overlay" id="overlay"><h1 id="ovTitle"></h1><p id="ovDesc"></p><div class="cd" id="cd"></div></div>

/* ---------- 推箱子 ---------- */
let skLv=0,skMode="select",skWalls,skTargets,skBoxes,skPlayer,skCols,skRows,skHist,skMov,skWonFlag;
function skUnlocked(i){return i===0||(stats.sokoban.cleared[i-1]);}
startGame.sokoban=()=>{skMode="select";drawSokoSelect();};
function drawSokoSelect(){
  $("#skSelect").style.display="";$("#skPlay").style.display="none";
  const sel=$("#skSelect");sel.innerHTML=`<div class="ghint">${T().pickLevel}</div>`;
  const g=document.createElement("div");g.className="lvgrid";
  LEVELS.forEach((_,i)=>{const cleared=stats.sokoban.cleared[i];const unlocked=skUnlocked(i);
    const b=document.createElement("button");b.className="lvcell"+(cleared?" clear":"")+(unlocked?"":" lock");
    b.innerHTML=`${unlocked?(i+1):"🔒"}${cleared?'<span class="st">✓</span>':''}`;
    if(unlocked)b.onclick=()=>loadLevel(i);sel.appendChild(g);g.appendChild(b);});
  sel.appendChild(g);
}
function loadLevel(i){skLv=i;skWalls=new Set();skTargets=new Set();skBoxes=new Set();
  const grid=LEVELS[i];skRows=grid.length;skCols=Math.max(...grid.map(r=>r.length));
  grid.forEach((row,r)=>{for(let c=0;c<skCols;c++){const ch=row[c]||" ";const k=r+","+c;
    if(ch==="#")skWalls.add(k);else if(ch===".")skTargets.add(k);else if(ch==="$")skBoxes.add(k);
    else if(ch==="*"){skBoxes.add(k);skTargets.add(k);}else if(ch==="@")skPlayer=k;
    else if(ch==="+"){skPlayer=k;skTargets.add(k);}}});
  skHist=[];skMov=0;skWonFlag=false;skMode="play";drawSoko();}
function drawSoko(){
  $("#skSelect").style.display="none";$("#skPlay").style.display="";
  $("#skHint").textContent=T().skHint;$("#skLevel").textContent=T().skLevel(skLv+1);
  $("#skMoves").textContent=T().moves(skMov);$("#skUndo").textContent=T().skUndo;
  $("#skReset").textContent=T().skReset;$("#skNext").textContent=T().skNext;
  const board=$("#skBoard");board.style.gridTemplateColumns=`repeat(${skCols},34px)`;board.innerHTML="";
  for(let r=0;r<skRows;r++)for(let c=0;c<skCols;c++){const k=r+","+c;const cell=document.createElement("div");
    if(skWalls.has(k)){cell.className="sk sk-wall";}
    else{const tgt=skTargets.has(k);cell.className="sk "+(tgt?"sk-target":"sk-floor");
      if(skPlayer===k)cell.textContent="🤖";
      else if(skBoxes.has(k)){cell.textContent="📦";if(tgt)cell.classList.add("sk-boxok");}}
    board.appendChild(cell);}
}
refreshGame.sokoban=()=>{skMode==="play"?drawSoko():drawSokoSelect();};
function skMove(m){if(skMode!=="play"||skWonFlag)return;
  const [pr,pc]=skPlayer.split(",").map(Number);const d={up:[-1,0],down:[1,0],left:[0,-1],right:[0,1]}[m];
  const nr=pr+d[0],nc=pc+d[1],nk=nr+","+nc;
  if(skWalls.has(nk))return;
  const hist={p:skPlayer,b:new Set(skBoxes)};
  if(skBoxes.has(nk)){const br=nr+d[0],bc=nc+d[1],bk=br+","+bc;
    if(skWalls.has(bk)||skBoxes.has(bk))return;
    skBoxes.delete(nk);skBoxes.add(bk);}
  skPlayer=nk;skHist.push(hist);skMov++;drawSoko();
  if([...skTargets].every(t=>skBoxes.has(t)))skWin();}
function skWin(){skWonFlag=true;const first=!stats.sokoban.cleared[skLv];
  stats.sokoban.cleared[skLv]=true;
  const bm=stats.sokoban.best||{};if(bm[skLv]==null||skMov<bm[skLv]){bm[skLv]=skMov;stats.sokoban.best=bm;}
  save();checkAch();
  const all=sokoCleared(stats)>=LEVELS.length;
  $("#skMsg").textContent=all?T().skAll:T().skWin;
  $("#skNext").style.display=(skLv+1<LEVELS.length)?"":"none";}
$("#skUndo").onclick=()=>{if(skMode!=="play"||!skHist.length)return;const h=skHist.pop();
  skPlayer=h.p;skBoxes=h.b;skMov=Math.max(0,skMov-1);skWonFlag=false;$("#skMsg").textContent="";
  $("#skNext").style.display="none";drawSoko();};
$("#skReset").onclick=()=>loadLevel(skLv);
$("#skNext").onclick=()=>{if(skLv+1<LEVELS.length)loadLevel(skLv+1);};
document.querySelectorAll("[data-sk]").forEach(b=>b.onclick=()=>skMove(b.dataset.sk));
document.addEventListener("keydown",e=>{if(current!=="sokoban"||skMode!=="play")return;
  const m={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right",w:"up",s:"down",a:"left",d:"right",W:"up",S:"down",A:"left",D:"right"}[e.key];
  if(m){e.preventDefault();skMove(m);}
  else if(e.key==="z"||e.key==="Z")$("#skUndo").click();
  else if(e.key==="r"||e.key==="R")$("#skReset").click();});
(function(){const bd=$("#skBoard");let sx,sy;
  bd.addEventListener("touchstart",e=>{const t=e.touches[0];sx=t.clientX;sy=t.clientY;},{passive:true});
  bd.addEventListener("touchend",e=>{if(sx==null)return;const t=e.changedTouches[0];
    const dx=t.clientX-sx,dy=t.clientY-sy;if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
    skMove(Math.abs(dx)>Math.abs(dy)?(dx>0?"right":"left"):(dy>0?"down":"up"));sx=sy=null;},{passive:true});})();

const pclamp=v=>Math.max(0,Math.min(100,Math.round(v)));
function petEnsure(){if(!stats.pet)stats.pet={hunger:80,happy:80,energy:80,level:1,xp:0,cared:0,lastSeen:Date.now()};}
function petDecay(){petEnsure();const p=stats.pet;const now=Date.now();const m=Math.max(0,(now-(p.lastSeen||now))/60000);
  if(m>0){p.hunger=pclamp(p.hunger-m*0.5);p.happy=pclamp(p.happy-m*0.4);p.energy=pclamp(p.energy-m*0.3);}
  p.lastSeen=now;save();}
let petTick=null;
startGame.pet=()=>{petEnsure();petDecay();drawPet();clearInterval(petTick);
  petTick=setInterval(()=>{if(current!=="pet"){clearInterval(petTick);return;}petDecay();drawPet();},5000);};

    mouth=mood==="happy"?'<path d="M50 67 q10 10 20 0" stroke="#5a3d33" stroke-width="3" fill="none" stroke-linecap="round"/>'
      :mood==="sad"?'<path d="M50 73 q10 -9 20 0" stroke="#5a3d33" stroke-width="3" fill="none" stroke-linecap="round"/>'
      :'<line x1="52" y1="70" x2="68" y2="70" stroke="#5a3d33" stroke-width="3" stroke-linecap="round"/>';
  }
  return '<svg width="150" height="150" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">'
    +'<ellipse cx="38" cy="26" rx="11" ry="12" fill="#d98463"/><ellipse cx="82" cy="26" rx="11" ry="12" fill="#d98463"/>'
    +'<ellipse cx="60" cy="64" rx="44" ry="44" fill="#d98463"/>'
    +'<ellipse cx="60" cy="74" rx="30" ry="28" fill="#f3cbb1"/>'
    +'<circle cx="40" cy="66" r="5.5" fill="#e98f86" opacity=".55"/><circle cx="80" cy="66" r="5.5" fill="#e98f86" opacity=".55"/>'
    +'<g fill="#fff7ec"><path d="M60 84 l2.6 6 6 2.6 -6 2.6 -2.6 6 -2.6 -6 -6 -2.6 6 -2.6z"/></g>'
    +eyes+mouth+extra+'</svg>';
}
function petBar(lab,val,color){return '<div class="pbar"><span class="lab">'+lab+'</span><span class="track"><span class="fill" style="width:'+val+'%;background:'+color+'"></span></span></div>';}
function drawPet(){petEnsure();const p=stats.pet;const mood=petMood();
  $("#petHint").textContent=T().petHint;$("#petLevel").textContent=T().petLevel(p.level);
  $("#petMoodTxt").textContent={happy:T().petMoodHappy,neutral:T().petMoodOk,sad:T().petMoodSad,sleepy:T().petMoodSleepy}[mood];
  $("#petMascot").innerHTML=mascotSVG(mood);
  $("#petStats").innerHTML=petBar(T().petHunger,p.hunger,"#e8a04a")+petBar(T().petHappy,p.happy,"#5bb377")+petBar(T().petEnergy,p.energy,"#4a78b0");
  $("#petFeed").textContent=T().petFeed;$("#petPlay").textContent=T().petPlay;$("#petSleep").textContent=T().petSleep;$("#petClean").textContent=T().petClean;}
function petFloat(emoji){const fx=$("#petFx");if(!fx)return;const s=document.createElement("div");s.className="petfx";
  s.textContent=emoji;s.style.left=(38+Math.random()*44)+"%";fx.appendChild(s);setTimeout(()=>s.remove(),1000);}
function petGain(xp){const p=stats.pet;p.xp+=xp;let need=8+p.level*4;
  while(p.xp>=need){p.xp-=need;p.level++;need=8+p.level*4;const msg=T().petLevelUp(p.level);
    toastQueue.push({ic:"🎉",zh:[msg],en:[msg],ja:[msg]});drainToast();}}
function petAction(a){petEnsure();const p=stats.pet;
  if(a==="feed"){p.hunger=pclamp(p.hunger+26);p.happy=pclamp(p.happy+4);petFloat("🍪");petGain(3);}
  else if(a==="play"){if(p.energy<10){$("#petMoodTxt").textContent=T().petTired;return;}
    p.happy=pclamp(p.happy+22);p.energy=pclamp(p.energy-14);petFloat("🎈");petGain(4);}
  else if(a==="sleep"){p.energy=pclamp(p.energy+34);p.hunger=pclamp(p.hunger-6);petFloat("💤");petGain(2);}
  else if(a==="clean"){p.happy=pclamp(p.happy+14);petFloat("🫧");petGain(2);}
  p.cared=(p.cared||0)+1;p.lastSeen=Date.now();save();checkAch();drawPet();}
document.querySelectorAll("[data-pet]").forEach(b=>b.onclick=()=>petAction(b.dataset.pet));

/* ---------- 脑筋急转弯 ---------- */
let rIdx=0;
startGame.riddle=()=>{rIdx=Math.floor(Math.random()*RIDDLES[lang].length);drawRiddle();};
function drawRiddle(){const bank=RIDDLES[lang];const [q,a]=bank[rIdx%bank.length];
  $("#rq").textContent=q;$("#ra").textContent=T().ansPrefix+a;$("#ra").classList.remove("show");
  $("#rReveal").textContent=T().reveal;$("#rNext").textContent=T().next;
  $("#rMeta").innerHTML=`<span>${T().riddleMeta(rIdx%bank.length+1)}</span>`;}
refreshGame.riddle=drawRiddle;
$("#rReveal").onclick=()=>{$("#ra").classList.add("show");stats.riddlesSeen=(stats.riddlesSeen||0)+1;save();checkAch();};
$("#rNext").onclick=()=>{rIdx++;drawRiddle();};

/* ---------- 记忆翻牌 ---------- */
const SYM=["🍎","🍋","🍇","🍑","🍓","🥝","🍒","🥥"];
let mDeck=[],mFlip=[],mMoves=0,mPairs=0,mLock=false;
startGame.memory=()=>{mDeck=[...SYM,...SYM].map(s=>({s,done:false})).sort(()=>Math.random()-.5);
  mFlip=[];mMoves=0;mPairs=0;mLock=false;drawMemory();};
function drawMemory(){const g=$("#mGrid");g.innerHTML="";
  mDeck.forEach((c,i)=>{const el=document.createElement("div");el.className="mcard";
    if(c.done){el.classList.add("done");el.textContent=c.s;}
    else if(mFlip.includes(i)){el.classList.add("flip");el.textContent=c.s;}
    el.onclick=()=>flipCard(i);g.appendChild(el);});
  $("#mMoves").textContent=T().moves(mMoves);$("#mPairs").textContent=T().pairs(mPairs,SYM.length);
  $("#mRestart").textContent=T().restart;}
refreshGame.memory=drawMemory;
$("#mRestart").onclick=()=>startGame.memory();
function flipCard(i){if(mLock||mDeck[i].done||mFlip.includes(i))return;mFlip.push(i);drawMemory();
  if(mFlip.length===2){mMoves++;mLock=true;const [a,b]=mFlip;
    if(mDeck[a].s===mDeck[b].s){mDeck[a].done=mDeck[b].done=true;mPairs++;mFlip=[];mLock=false;drawMemory();
      if(mPairs===SYM.length){stats.memWins=(stats.memWins||0)+1;save();checkAch();setTimeout(()=>alert(T().memWin),150);}}
    else setTimeout(()=>{mFlip=[];mLock=false;drawMemory();},700);}}

/* ---------- 2048 ---------- */
let board=[],score2048=0;
startGame["2048"]=()=>{board=Array(16).fill(0);score2048=0;spawn();spawn();draw2048();};
function spawn(){const e=[];board.forEach((v,i)=>{if(!v)e.push(i);});if(!e.length)return;
  board[e[Math.floor(Math.random()*e.length)]]=Math.random()<.9?2:4;}
const COL2048={2:"#f3eddd",4:"#efe2c2",8:"#e8b06b",16:"#e29653",32:"#dd7f4f",64:"#d96343",
  128:"#e7c95a",256:"#e6c64c",512:"#e5c23a",1024:"#e3bf22",2048:"#d9a441"};
function draw2048(){const g=$("#g2048");g.innerHTML="";
  board.forEach(v=>{const t=document.createElement("div");t.className="t2048";
    if(v){t.textContent=v;t.style.background=COL2048[v]||"#d9a441";if(v>=8)t.style.color="#fff";
      t.style.fontSize=v>=1024?"15px":v>=128?"18px":"21px";}g.appendChild(t);});
  $("#s2048").textContent=T().score(score2048);$("#restart2048").textContent=T().restart;}
refreshGame["2048"]=draw2048;
$("#restart2048").onclick=()=>startGame["2048"]();
function slide(line){let a=line.filter(x=>x);
  for(let i=0;i<a.length-1;i++)if(a[i]===a[i+1]){a[i]*=2;score2048+=a[i];a.splice(i+1,1);}
  while(a.length<4)a.push(0);return a;}
function move(dir){if(current!=="2048")return;const before=board.join(",");
  if(dir==="up"||dir==="down"){let cols=[0,1,2,3].map(c=>[0,1,2,3].map(r=>board[r*4+c]));
    cols=cols.map(col=>dir==="up"?slide(col):slide(col.slice().reverse()).reverse());
    cols.forEach((col,c)=>col.forEach((v,r)=>board[r*4+c]=v));}
  else{let rows=[];for(let r=0;r<4;r++)rows.push([0,1,2,3].map(c=>board[r*4+c]));
    rows=dir==="left"?rows.map(slide):rows.map(r=>slide(r.slice().reverse()).reverse());
    rows.forEach((row,r)=>row.forEach((v,c)=>board[r*4+c]=v));}
  if(board.join(",")!==before){spawn();draw2048();best("best2048",Math.max(...board));checkOver();}}
function checkOver(){if(board.includes(2048)){setTimeout(()=>alert(T().won2048),150);return;}
  if(board.includes(0))return;
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){const v=board[r*4+c];
    if(c<3&&v===board[r*4+c+1])return;if(r<3&&v===board[(r+1)*4+c])return;}
  setTimeout(()=>alert(T().over2048),150);}
document.addEventListener("keydown",e=>{const m={ArrowLeft:"left",ArrowRight:"right",ArrowUp:"up",ArrowDown:"down"}[e.key];
  if(m&&current==="2048"){e.preventDefault();move(m);}});
document.querySelectorAll("[data-dir]").forEach(b=>b.onclick=()=>move(b.dataset.dir));

/* ---------- 猜数字 ---------- */
let secret=0,tries=0;
startGame.guess=()=>{secret=Math.floor(Math.random()*100)+1;tries=0;
  $("#guessInput").value="";$("#guessHint").textContent="";drawGuess();};
function drawGuess(){$("#guessPrompt").textContent=T().guessPrompt;
  $("#guessBtn").textContent=T().guessBtn;$("#guessRestart").textContent=T().guessRestart;}
refreshGame.guess=drawGuess;
$("#guessRestart").onclick=()=>startGame.guess();
function doGuess(){const v=parseInt($("#guessInput").value,10);
  if(isNaN(v)||v<1||v>100){$("#guessHint").textContent=T().guessBad;return;}tries++;
  if(v===secret){$("#guessHint").style.color="#3fa45a";$("#guessHint").textContent=T().correct(tries);best("guessBest",tries,false);}
  else{$("#guessHint").style.color="var(--blue)";$("#guessHint").textContent=v<secret?T().higher:T().lower;}}
$("#guessBtn").onclick=doGuess;
$("#guessInput").addEventListener("keydown",e=>{if(e.key==="Enter")doGuess();});

/* ---------- 反应测试 ---------- */
let rState="idle",rStart=0,rTimer=null;
startGame.react=()=>{rState="idle";clearTimeout(rTimer);drawReact();$("#reactResult").textContent="";};
function drawReact(){const box=$("#reactBox");box.className="react "+(rState==="go"?"go":rState==="wait"?"wait":"idle");
  box.textContent=rState==="go"?T().reactGo:rState==="wait"?T().reactWait:T().reactIdle;}
refreshGame.react=drawReact;
$("#reactBox").onclick=()=>{
  if(rState==="idle"){rState="wait";drawReact();rTimer=setTimeout(()=>{rState="go";rStart=performance.now();drawReact();},800+Math.random()*2200);}
  else if(rState==="wait"){clearTimeout(rTimer);rState="idle";drawReact();$("#reactResult").textContent=T().reactSoon;}
  else if(rState==="go"){const ms=Math.round(performance.now()-rStart);rState="idle";drawReact();
    $("#reactResult").textContent=T().reactMs(ms)+" · "+T().reactAgain;best("reactBest",ms,false);}};

/* ---------- 伐木工 ---------- */
let tree=[],pSide="left",tScore=0,tTimer=100,timberTick=null,tDead=false;
function tSeg(noBranch){if(noBranch)return{b:"none"};const r=Math.random();return{b:r<.5?"none":r<.75?"left":"right"};}
startGame.timber=()=>{tree=[];for(let i=0;i<8;i++)tree.push(tSeg(i<2));pSide="left";tScore=0;tTimer=100;tDead=false;drawTimber();
  clearInterval(timberTick);timberTick=setInterval(()=>{if(document.hidden||tDead||current!=="timber")return;
    tTimer-=1.4;if(tTimer<=0)timberOver();else $("#timberBar").style.width=tTimer+"%";},100);};
function drawTimber(){$("#timberHint").textContent=T().timberHint;$("#timberScore").textContent=T().score(tScore);
  $("#timberL").textContent=T().timberL;$("#timberR").textContent=T().timberR;$("#timberBar").style.width=tTimer+"%";
  const wrap=$("#timberTree");wrap.innerHTML="";
  tree.slice(0,7).forEach((seg,i)=>{const row=document.createElement("div");row.className="trow";
    const l=document.createElement("div");l.className="branch bl";l.textContent=seg.b==="left"?"🌿":"";
    const t=document.createElement("div");t.className="trunk";
    const r=document.createElement("div");r.className="branch br";r.textContent=seg.b==="right"?"🌿":"";
    if(i===0){if(pSide==="left")l.innerHTML='<span class="player">🧍🪓</span>';else r.innerHTML='<span class="player">🪓🧍</span>';}
    row.append(l,t,r);wrap.appendChild(row);});}
refreshGame.timber=drawTimber;
function chop(side){if(tDead||current!=="timber")return;pSide=side;tree.shift();tree.push(tSeg());
  if(tree[0].b===side){drawTimber();timberOver();return;}tScore++;tTimer=Math.min(100,tTimer+11);drawTimber();}
function timberOver(){tDead=true;clearInterval(timberTick);best("timberBest",tScore);$("#timberMsg").textContent=T().gameOver(tScore);}
document.querySelectorAll("[data-chop]").forEach(b=>b.onclick=()=>{if(tDead)startGame.timber();else chop(b.dataset.chop);});
document.addEventListener("keydown",e=>{if(current!=="timber")return;
  if(e.key==="ArrowLeft"){e.preventDefault();tDead?startGame.timber():chop("left");}
  if(e.key==="ArrowRight"){e.preventDefault();tDead?startGame.timber():chop("right");}});

/* ---------- Flappy ---------- */
const fcv=$("#flappyCanvas"),fx=fcv.getContext("2d");
let bird,pipes,fScore,flappyRunning=false,fStarted=false;
startGame.flappy=()=>{bird={y:200,v:0};pipes=[];fScore=0;fStarted=false;flappyRunning=true;
  $("#flappyHint").textContent=T().flappyHint;$("#flappyScore").textContent=T().score(0);
  $("#flappyMsg").textContent=T().tapStart;requestAnimationFrame(flappyLoop);};
refreshGame.flappy=()=>{$("#flappyHint").textContent=T().flappyHint;$("#flappyScore").textContent=T().score(fScore||0);};
function flappyFlap(){if(!flappyRunning)return;if(!fStarted){fStarted=true;$("#flappyMsg").textContent="";}bird.v=-6.5;}
fcv.onclick=flappyFlap;
document.addEventListener("keydown",e=>{if(current==="flappy"&&e.code==="Space"){e.preventDefault();
  if(flappyRunning)flappyFlap();else startGame.flappy();}});
function flappyLoop(){if(current!=="flappy")return;
  if(document.hidden){requestAnimationFrame(flappyLoop);return;}
  fx.clearRect(0,0,300,400);
  if(flappyRunning&&fStarted){bird.v+=0.42;bird.y+=bird.v;
    if(!pipes.length||pipes[pipes.length-1].x<180){const gap=120;const top=40+Math.random()*180;pipes.push({x:300,top,gap,passed:false});}
    pipes.forEach(p=>p.x-=2.2);if(pipes.length&&pipes[0].x<-50)pipes.shift();
    pipes.forEach(p=>{if(!p.passed&&p.x+50<70){p.passed=true;fScore++;$("#flappyScore").textContent=T().score(fScore);}});
    if(bird.y>388||bird.y<0)flappyOver();
    pipes.forEach(p=>{if(70+12>p.x&&70-12<p.x+50&&(bird.y-12<p.top||bird.y+12>p.top+p.gap))flappyOver();});}
  fx.fillStyle="#5bb377";pipes&&pipes.forEach(p=>{fx.fillRect(p.x,0,50,p.top);fx.fillRect(p.x,p.top+p.gap,50,400);});
  fx.font="24px serif";fx.fillText("🐤",70-12,(bird?bird.y:200)+9);
  if(flappyRunning)requestAnimationFrame(flappyLoop);}
function flappyOver(){if(!flappyRunning)return;flappyRunning=false;best("flappyBest",fScore);
  $("#flappyMsg").textContent=T().gameOver(fScore);fcv.onclick=()=>{fcv.onclick=flappyFlap;startGame.flappy();};}

/* ---------- 滑块拼图 ---------- */
let sArr=[],sMoves=0;
startGame.slide=()=>{sArr=[1,2,3,4,5,6,7,8,0];sMoves=0;
  for(let i=0;i<200;i++){const e=sArr.indexOf(0);const nb=slideNb(e);sSwap(e,nb[Math.floor(Math.random()*nb.length)]);}
  sMoves=0;$("#slideMsg").textContent="";drawSlide();};
function slideNb(i){const r=Math.floor(i/3),c=i%3,n=[];if(r>0)n.push(i-3);if(r<2)n.push(i+3);if(c>0)n.push(i-1);if(c<2)n.push(i+1);return n;}
function sSwap(a,b){[sArr[a],sArr[b]]=[sArr[b],sArr[a]];}
function drawSlide(){$("#slideHint").textContent=T().slideHint;$("#slideShuffle").textContent=T().shuffle;
  $("#slideMoves").textContent=T().moves(sMoves);const g=$("#sGrid");g.innerHTML="";
  sArr.forEach((v,i)=>{const b=document.createElement("button");b.className="stile"+(v===0?" empty":"");
    b.textContent=v||"";b.onclick=()=>sClick(i);g.appendChild(b);});}
refreshGame.slide=drawSlide;
$("#slideShuffle").onclick=()=>startGame.slide();
function sClick(i){const e=sArr.indexOf(0);if(slideNb(i).includes(e)){sSwap(i,e);sMoves++;drawSlide();
  if(sArr.join()==="1,2,3,4,5,6,7,8,0"){stats.slideSolved=(stats.slideSolved||0)+1;save();checkAch();$("#slideMsg").textContent=T().slideSolved;}}}

/* ===================== 完工 & 自动关闭 ===================== */
function finish(){if(done)return;done=true;
  $("#status").classList.add("done");$("#statusText").textContent=T().statusDone;
  $("#ovTitle").textContent=T().ovTitle;$("#ovDesc").textContent=T().ovDesc;$("#overlay").classList.add("show");
  let n=3;$("#cd").textContent=T().cd(n);
  const t=setInterval(()=>{n--;$("#cd").textContent=n>0?T().cd(n):T().canClose;if(n<=0){clearInterval(t);window.close();}},1000);}
setInterval(()=>{fetch("./STATUS?"+Math.floor(performance.now())).then(r=>r.ok?r.text():"")
  .then(t=>{if(t.trim()==="done")finish();}).catch(()=>{});},1000);

/* ---------- hash 路由（便于截图/直达） ---------- */
function route(){const h=location.hash.slice(1);
  if(h==="done"){finish();return;}
  if(h==="ach"){show("ach");drawAch();return;}
  if(h==="sokoban-play"){show("sokoban");record("sokoban");loadLevel(4);return;}
  if(GAMES.some(g=>g.id===h)){openGame(h);return;}
  show("home");}

/* 截图演示用：?demo 在内存里点亮部分进度，不写入存档 */
if(location.search.indexOf("demo")>=0){
  ["first","soko1","soko5","win2048","fast","mem","timber20","slide","petcare"].forEach(id=>stats.unlocked[id]=true);
  [0,1,2,3,4,5].forEach(i=>stats.sokoban.cleared[i]=true);
  stats.pet={hunger:88,happy:92,energy:80,level:3,xp:4,cared:9,lastSeen:Date.now()};
}
renderChrome();route();
window.addEventListener("hashchange",route);
